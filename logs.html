<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Логи системы</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #00c80c;
            margin: 0;
            padding: 20px;
        }
        h2 {
            color: #ff001e;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ff001e;
            padding: 10px;
            text-align: left;
        }
        th {
            background: rgba(255, 0, 30, 0.2);
        }
        .back {
            color: #ff001e;
            text-decoration: none;
            display: block;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h2>📋 Логи системы</h2>
    <a href="index.html" class="back">← На главную</a>
    <div id="logs-container"></div>

    <script>
        window.onload = function() {
            const container = document.getElementById('logs-container');
            try {
                const logs = JSON.parse(localStorage.getItem('admin_logs') || '[]');
                logs.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

                if (logs.length === 0) {
                    container.innerHTML = '<p>Нет записей.</p>';
                    return;
                }

                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Время</th>
                            <th>Админ</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                `;

                const tbody = table.querySelector('tbody');
                logs.forEach(log => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = new Date(log.timestamp).toLocaleString();
                    row.insertCell(1).textContent = log.admin;
                    row.insertCell(2).textContent = log.action;
                });

                container.appendChild(table);
            } catch (e) {
                container.innerHTML = '<p style="color:#8B0000">Ошибка: ' + e.message + '</p>';
            }
        };
    </script>
</body>
</html>
