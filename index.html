<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Портал правительства штата</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: rgb(15, 150, 87);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .btn {
            display: block;
            width: 280px;
            margin: 15px auto;
            padding: 14px;
            background-color: #000000;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 0 8px rgba(255, 0, 30, 0.4);
        }
        .btn:hover {
            background-color: #0cc80c;
            color: black;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 200, 12, 0.6);
        }
        .admin-link {
            font-size: 12px;
            color: rgb(255, 0, 30);
            text-decoration: none;
            margin-top: 10px;
        }
        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div style="text-align:center;">
        <h1 style="color:rgb(255,0,0);">ПОРТАЛ ПРАВИТЕЛЬСТВА ШТАТА</h1>
        <a href="employment.html" class="btn">ТРУДОУСТРОЙСТВО</a>

        <!-- Кнопка входа в админку -->
        <a href="#" class="btn" onclick="openAdminPanel(); return false;">
            🔐 Вход в админ-панель
        </a>

        <!-- Подсказка -->
        <a href="#" class="admin-link" onclick="alert('Доступ только у администраторов. Введите правильный пароль.'); return false;">
            ? Как войти
        </a>
    </div>

    <script>
        // === ФУНКЦИЯ ВХОДА В АДМИН-ПАНЕЛЬ ===
        function openAdminPanel() {
            const correctPassword = 'admin123'; // 🔴 ЗАМЕНИТЕ НА СВОЙ!
            const maxAttempts = 3;
            let attempts = 0;

            while (attempts < maxAttempts) {
                const pass = prompt('🔐 Введите пароль для входа в админ-панель:');
                if (pass === null) {
                    alert('Вход отменён.');
                    return;
                }
                if (pass === correctPassword) {
                    // Пароль верный — переходим в админку
                    window.location.href = 'admin.html';
                    return;
                }
                attempts++;
                alert(`Неверный пароль. Осталось попыток: ${maxAttempts - attempts}`);
            }

            alert('❌ Доступ запрещён. Превышено количество попыток.');
        }
    </script>
</body>
</html>
